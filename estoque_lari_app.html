<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estoque LARI</title>
  <style>
    :root {
      --azul: #1565c0;
      --azul-escuro: #0d47a1;
      --azul-claro: #e3f2fd;
      --borda: #cfe0f5;
      --texto: #1f2937;
      --muted: #6b7280;
      --sucesso: #0f9d58;
      --erro: #c62828;
      --fundo: #f5f9ff;
      --branco: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--fundo), #edf4ff);
      color: var(--texto);
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .card {
      background: var(--branco);
      border: 1px solid var(--borda);
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(13, 71, 161, 0.08);
    }
    .hero {
      padding: 20px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--azul), var(--azul-escuro));
      color: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    h1 {
      margin: 0;
      font-size: 1.6rem;
    }
    .sub {
      margin: 4px 0 0;
      opacity: 0.95;
      font-size: 0.96rem;
    }
    .search-card {
      padding: 18px;
      margin-bottom: 16px;
    }
    .label {
      font-weight: 700;
      margin-bottom: 8px;
      display: block;
      color: var(--azul-escuro);
    }
    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    input {
      flex: 1 1 260px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--borda);
      font-size: 1rem;
      outline: none;
    }
    input:focus {
      border-color: var(--azul);
      box-shadow: 0 0 0 3px rgba(21,101,192,0.12);
    }
    button {
      padding: 14px 18px;
      border: 0;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--azul);
      color: white;
    }
    .btn-secondary {
      background: var(--azul-claro);
      color: var(--azul-escuro);
    }
    .hint {
      margin-top: 10px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      padding: 16px;
    }
    .stat strong {
      display: block;
      font-size: 1.5rem;
      color: var(--azul-escuro);
      margin-top: 6px;
    }
    .result {
      padding: 16px;
      margin-bottom: 12px;
    }
    .found {
      border-left: 6px solid var(--sucesso);
    }
    .not-found {
      border-left: 6px solid var(--erro);
    }
    .material {
      font-size: 1.08rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .meta div {
      background: #f8fbff;
      border: 1px solid var(--borda);
      border-radius: 16px;
      padding: 12px;
    }
    .meta span {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .list-title {
      margin: 14px 2px 10px;
      font-size: 1rem;
      color: var(--azul-escuro);
      font-weight: 700;
    }
    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 10px 0 0;
    }
    @media (max-width: 520px) {
      .meta {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 1.35rem;
      }
    }
  </style>
</head>

      return (texto || "")
        .toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function cardResultado(item) {
      return `
        <div class="card result found">
          <div class="material">${item.material}</div>
          <div class="meta">
            <div><span>Quantidade</span><strong>${item.quantidade}</strong></div>
            <div><span>Armário</span><strong>${item.armario}</strong></div>
            <div><span>Caixa</span><strong>${item.caixa}</strong></div>
          </div>
        </div>
      `;
    }

    function cardNaoEncontrado(termo) {
      return `
        <div class="card result not-found">
          <div class="material">Material não encontrado</div>
          <div>Não localizei resultado para <strong>${termo}</strong>.</div>
        </div>
      `;
    }

    function pesquisar() {
      const termo = buscaEl.value.trim();
      const termoNorm = normalizar(termo);

      resultadoExato.innerHTML = "";
      resultadosLista.innerHTML = "";

      if (!termoNorm) {
        tituloLista.textContent = "Sugestões";
        dados.slice(0, 12).forEach(item => {
          resultadosLista.insertAdjacentHTML("beforeend", cardResultado(item));
        });
        return;
      }

      const exato = dados.find(item => normalizar(item.material) === termoNorm);
      const aproximados = dados.filter(item => normalizar(item.material).includes(termoNorm));

      if (exato) {
        resultadoExato.innerHTML = cardResultado(exato);
      }

      if (aproximados.length === 0) {
        resultadoExato.innerHTML = cardNaoEncontrado(termo);
        tituloLista.textContent = "Nenhum resultado";
        return;
      }

      tituloLista.textContent = aproximados.length === 1 ? "1 resultado" : `${aproximados.length} resultados`;
      aproximados.slice(0, 30).forEach(item => {
        resultadosLista.insertAdjacentHTML("beforeend", cardResultado(item));
      });
    }

    btnBuscar.addEventListener("click", pesquisar);
    btnLimpar.addEventListener("click", () => {
      buscaEl.value = "";
      pesquisar();
      buscaEl.focus();
    });
    buscaEl.addEventListener("input", pesquisar);
    buscaEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") pesquisar();
    });

    pesquisar();
  </script>
</body>
</html>
